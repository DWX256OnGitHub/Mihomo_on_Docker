version: '3.8'

services:
  mihomo:
    image: ghcr.io/dwx256ongithub/mihomo-metacubexd:latest
    container_name: mihomo
    restart: unless-stopped
    ports:
      - "7890:7890"   # HTTP 代理端口
      - "7891:7891"   # HTTPS 代理端口
      - "9090:9090"   # Mihomo API 控制端口
      - "8080:8080"   # MetaCubeXD Web UI 端口
    volumes:
      - ./config:/config                    # 配置文件目录（宿主机:容器）
      - ./data:/root/.config/mihomo         # Mihomo 运行数据目录
    environment:
      - TZ=Asia/Shanghai                    # 设置时区为上海时间
    networks:
      - mihomo_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  mihomo_net:
    driver: bridge
